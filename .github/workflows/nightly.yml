name: Nightly Ecosystem Tests

on:
  schedule:
    - cron: '17 5 * * *'   # 05:17 UTC daily
  workflow_dispatch:        # manual trigger

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  build-kaappi:
    runs-on: macos-latest
    steps:
      - uses: mlugg/setup-zig@v2
        with:
          version: '0.16.0'

      - name: Build Kaappi from main
        run: |
          git clone --depth 1 https://github.com/kaappi/kaappi.git /tmp/kaappi
          cd /tmp/kaappi && zig build

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kaappi-binary
          path: /tmp/kaappi/zig-out/bin/kaappi
          retention-days: 1

  # ── Pure Scheme libraries (no native build, no services) ────────────
  pure-libs:
    needs: build-kaappi
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: kaappi-cli
            test-files: tests/test-cli.scm
          - repo: kaappi-json
            test-files: tests/test-json.scm
          - repo: kaappi-csv
            test-files: tests/test-csv.scm
          - repo: kaappi-toml
            test-files: tests/test-toml.scm
          - repo: kaappi-yaml
            test-files: tests/test-yaml.scm
          - repo: kaappi-log
            test-files: tests/test-log.scm
          - repo: kaappi-template
            test-files: tests/test-template.scm
          - repo: kaappi-test
            test-files: tests/test-framework.scm
          - repo: kaappi-bdd
            test-files: tests/test-bdd.scm

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kaappi-binary
          path: /tmp/kaappi/bin

      - name: Prepare binary
        run: chmod +x /tmp/kaappi/bin/kaappi

      - name: Clone ${{ matrix.repo }}
        run: git clone --depth 1 https://github.com/kaappi/${{ matrix.repo }}.git repo

      - name: Run tests
        run: |
          KAAPPI=/tmp/kaappi/bin/kaappi
          for f in ${{ matrix.test-files }}; do
            echo "::group::${f}"
            ${KAAPPI} --coverage --coverage-xml coverage.xml --lib-path repo/lib repo/${f}
            echo "::endgroup::"
          done

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage.xml
          flags: ${{ matrix.repo }}
          override_repo: kaappi/${{ matrix.repo }}
          fail_ci_if_error: false

  # ── Native libraries (need make, no services) ──────────────────────
  native-libs:
    needs: build-kaappi
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: kaappi-net
            test-files: tests/test-net.scm
          - repo: kaappi-crypto
            test-files: tests/test-crypto.scm
          - repo: kaappi-math
            test-files: tests/test-math.scm
            needs-zig: true

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kaappi-binary
          path: /tmp/kaappi/bin

      - name: Prepare binary
        run: chmod +x /tmp/kaappi/bin/kaappi

      - name: Setup Zig
        if: matrix.needs-zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.16.0'

      - name: Clone and build ${{ matrix.repo }}
        run: |
          git clone --depth 1 https://github.com/kaappi/${{ matrix.repo }}.git repo
          make -C repo

      - name: Run tests
        run: |
          KAAPPI=/tmp/kaappi/bin/kaappi
          for f in ${{ matrix.test-files }}; do
            echo "::group::${f}"
            ${KAAPPI} --coverage --coverage-xml coverage.xml --lib-path repo/lib repo/${f}
            echo "::endgroup::"
          done
        env:
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/repo
          LD_LIBRARY_PATH: ${{ github.workspace }}/repo

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage.xml
          flags: ${{ matrix.repo }}
          override_repo: kaappi/${{ matrix.repo }}
          fail_ci_if_error: false

  # ── Libraries with dependencies (need other kaappi-* repos) ────────
  dep-libs:
    needs: build-kaappi
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: kaappi-email
            dependencies: kaappi-net
            test-files: tests/test-mime.scm
          - repo: kaappi-http
            dependencies: kaappi-net
            has-native-build: true
            test-files: tests/test-parse.scm
          - repo: kaappi-web
            dependencies: kaappi-net kaappi-http kaappi-json
            test-files: tests/test-routing.scm tests/test-session.scm

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kaappi-binary
          path: /tmp/kaappi/bin

      - name: Prepare binary
        run: chmod +x /tmp/kaappi/bin/kaappi

      - name: Clone ${{ matrix.repo }}
        run: git clone --depth 1 https://github.com/kaappi/${{ matrix.repo }}.git repo

      - name: Clone and build dependencies
        run: |
          for dep in ${{ matrix.dependencies }}; do
            git clone --depth 1 "https://github.com/kaappi/${dep}.git" "/tmp/${dep}"
            if [ -f "/tmp/${dep}/Makefile" ]; then
              make -C "/tmp/${dep}"
            fi
          done

      - name: Build native library
        if: matrix.has-native-build
        run: make -C repo

      - name: Run tests
        run: |
          KAAPPI=/tmp/kaappi/bin/kaappi
          LIB_FLAGS="--lib-path repo/lib"
          NATIVE_PATHS=""
          for dep in ${{ matrix.dependencies }}; do
            LIB_FLAGS="${LIB_FLAGS} --lib-path /tmp/${dep}/lib"
            if [ -f "/tmp/${dep}/Makefile" ]; then
              NATIVE_PATHS="${NATIVE_PATHS:+${NATIVE_PATHS}:}/tmp/${dep}"
            fi
          done
          if [ "${{ matrix.has-native-build }}" = "true" ]; then
            NATIVE_PATHS="${NATIVE_PATHS:+${NATIVE_PATHS}:}${{ github.workspace }}/repo"
          fi
          export DYLD_LIBRARY_PATH="${NATIVE_PATHS}"
          export LD_LIBRARY_PATH="${NATIVE_PATHS}"

          for f in ${{ matrix.test-files }}; do
            echo "::group::${f}"
            ${KAAPPI} --coverage --coverage-xml coverage.xml ${LIB_FLAGS} repo/${f}
            echo "::endgroup::"
          done

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage.xml
          flags: ${{ matrix.repo }}
          override_repo: kaappi/${{ matrix.repo }}
          fail_ci_if_error: false

  # ── Libraries with service dependencies ─────────────────────────────
  service-libs:
    needs: build-kaappi
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: kaappi-redis
            dependencies: kaappi-net
            has-native-build: true
            service: redis
            test-files: tests/test-resp.scm tests/test-commands.scm
          - repo: kaappi-pg
            has-native-build: true
            service: postgresql
            test-files: tests/test-types.scm tests/test-dbapi.scm
          - repo: kaappi-sqlite
            has-native-build: true
            test-files: tests/test-types.scm tests/test-dbapi.scm

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kaappi-binary
          path: /tmp/kaappi/bin

      - name: Prepare binary
        run: chmod +x /tmp/kaappi/bin/kaappi

      - name: Clone ${{ matrix.repo }}
        run: git clone --depth 1 https://github.com/kaappi/${{ matrix.repo }}.git repo

      - name: Install Redis
        if: matrix.service == 'redis'
        run: brew install redis

      - name: Install PostgreSQL
        if: matrix.service == 'postgresql'
        run: brew install postgresql@14

      - name: Clone and build dependencies
        if: matrix.dependencies != ''
        run: |
          for dep in ${{ matrix.dependencies }}; do
            git clone --depth 1 "https://github.com/kaappi/${dep}.git" "/tmp/${dep}"
            if [ -f "/tmp/${dep}/Makefile" ]; then
              make -C "/tmp/${dep}"
            fi
          done

      - name: Build native library
        if: matrix.has-native-build
        run: make -C repo

      - name: Start Redis
        if: matrix.service == 'redis'
        run: redis-server --daemonize yes

      - name: Start PostgreSQL
        if: matrix.service == 'postgresql'
        run: |
          brew services start postgresql@14
          sleep 3
          /opt/homebrew/opt/postgresql@14/bin/createdb kaappi_test || true

      - name: Run tests
        run: |
          KAAPPI=/tmp/kaappi/bin/kaappi
          LIB_FLAGS="--lib-path repo/lib"
          NATIVE_PATHS="${{ github.workspace }}/repo"
          for dep in ${{ matrix.dependencies }}; do
            LIB_FLAGS="${LIB_FLAGS} --lib-path /tmp/${dep}/lib"
            if [ -f "/tmp/${dep}/Makefile" ]; then
              NATIVE_PATHS="${NATIVE_PATHS}:/tmp/${dep}"
            fi
          done
          export DYLD_LIBRARY_PATH="${NATIVE_PATHS}"
          export LD_LIBRARY_PATH="${NATIVE_PATHS}"

          for f in ${{ matrix.test-files }}; do
            echo "::group::${f}"
            ${KAAPPI} --coverage --coverage-xml coverage.xml ${LIB_FLAGS} repo/${f}
            echo "::endgroup::"
          done

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage.xml
          flags: ${{ matrix.repo }}
          override_repo: kaappi/${{ matrix.repo }}
          fail_ci_if_error: false

  # ── Examples smoke test ───────────────────────────────────────────────
  examples:
    needs: build-kaappi
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kaappi-binary
          path: /tmp/kaappi/bin

      - name: Prepare binary
        run: chmod +x /tmp/kaappi/bin/kaappi

      - name: Clone repos
        run: |
          git clone --depth 1 https://github.com/kaappi/kaappi-examples.git repo
          git clone --depth 1 https://github.com/kaappi/kaappi-net.git /tmp/kaappi-net
          cd /tmp/kaappi-net && make
          git clone --depth 1 https://github.com/kaappi/kaappi-http.git /tmp/kaappi-http
          git clone --depth 1 https://github.com/kaappi/kaappi-json.git /tmp/kaappi-json
          git clone --depth 1 https://github.com/kaappi/kaappi-web.git /tmp/kaappi-web
          git clone --depth 1 https://github.com/kaappi/kaappi-redis.git /tmp/kaappi-redis
          cd /tmp/kaappi-redis && make

      - name: Smoke test imports
        run: |
          /tmp/kaappi/bin/kaappi \
            --lib-path /tmp/kaappi-net/lib \
            --lib-path /tmp/kaappi-http/lib \
            --lib-path /tmp/kaappi-json/lib \
            --lib-path /tmp/kaappi-web/lib \
            --lib-path /tmp/kaappi-redis/lib \
            -e '(import (kaappi web)) (import (kaappi json)) (display "ok") (newline)'
        env:
          DYLD_LIBRARY_PATH: /tmp/kaappi-net:/tmp/kaappi-redis
          LD_LIBRARY_PATH: /tmp/kaappi-net:/tmp/kaappi-redis

  # ── Summary ─────────────────────────────────────────────────────────
  summary:
    if: always()
    needs: [pure-libs, native-libs, dep-libs, service-libs, examples]
    runs-on: macos-latest
    steps:
      - name: Build summary
        id: summary
        run: |
          DATE=$(date -u +%Y-%m-%d)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          {
            echo "## Nightly Ecosystem Results — ${DATE}"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Pure Scheme libs | ${{ needs.pure-libs.result }} |"
            echo "| Native libs | ${{ needs.native-libs.result }} |"
            echo "| Libs with deps | ${{ needs.dep-libs.result }} |"
            echo "| Libs with services | ${{ needs.service-libs.result }} |"
            echo "| Examples | ${{ needs.examples.result }} |"
            echo ""
            echo "[View run](${RUN_URL})"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED=false
          for result in \
            "${{ needs.pure-libs.result }}" \
            "${{ needs.native-libs.result }}" \
            "${{ needs.dep-libs.result }}" \
            "${{ needs.service-libs.result }}" \
            "${{ needs.examples.result }}"; do
            [ "$result" != "success" ] && FAILED=true
          done
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

      - name: Triage failure
        if: steps.summary.outputs.failed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${{ github.run_id }}"
          DATE=$(date -u +%Y-%m-%d)

          BODY=$(cat <<EOF
          Nightly ecosystem tests failed on ${DATE}.

          | Job | Status |
          |-----|--------|
          | Pure Scheme libs | ${{ needs.pure-libs.result }} |
          | Native libs | ${{ needs.native-libs.result }} |
          | Libs with deps | ${{ needs.dep-libs.result }} |
          | Libs with services | ${{ needs.service-libs.result }} |
          | Examples | ${{ needs.examples.result }} |

          [View workflow run](${RUN_URL})
          EOF
          )

          gh label create nightly-failure --color D93F0B \
            --description "Nightly ecosystem test failure" \
            --repo "$REPO" --force 2>/dev/null || true

          EXISTING=$(gh issue list --repo "$REPO" --label nightly-failure \
            --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "$BODY" | gh issue comment "$EXISTING" --repo "$REPO" --body-file -
          else
            echo "$BODY" | gh issue create --repo "$REPO" \
              --title "Nightly ecosystem failure — ${DATE}" \
              --label nightly-failure --body-file -
          fi

      - name: Close resolved issue
        if: steps.summary.outputs.failed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          EXISTING=$(gh issue list --repo "$REPO" --label nightly-failure \
            --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --repo "$REPO" \
              --comment "Nightly run passed on $(date -u +%Y-%m-%d). Closing. [View run](https://github.com/${REPO}/actions/runs/${{ github.run_id }})"
          fi

      - name: Fail if any group failed
        if: steps.summary.outputs.failed == 'true'
        run: |
          echo "::error::One or more ecosystem packages failed against latest kaappi"
          exit 1
